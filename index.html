    <style>
      @font-face {
        font-family: "Inter var";

  <body>
    <div class="custom-cursor-ring"></div>
    <div class="custom-cursor-dot"></div>
    
    <div class="ambient-glow"></div>

    <header>
      <button id="logo" aria-label="Toggle dark mode" title="Toggle dark mode">
        <div class="circle" aria-hidden="true"></div>
      </button>
      <h1 class="title"><span class="name">Thomas Rettig’s</span><br>Page of Links</h1>
    </header>
    <main>
      <div class="columns-4">
        <dl>
          <dt>Programming</dt>
          <dd><a href="https://github.com/ThomasRettig/">Github</a></dd>
          <dd><a href="https://stackoverflow.com/users/16381861/thomas-rettig">Stack Overflow</a></dd>
        </dl>
        <dl>
          <dt>Design</dt>
          <dd><a href="https://www.figma.com/@thomasrettig">Figma</a></dd>
          <dd><a href="https://unsplash.com/@thmsrttg">Unsplash</a></dd>
        </dl>
        <dl>
          <dt>Social</dt>
          <dd><a href="https://www.youtube.com/@thmsrttg">YouTube</a></dd>
        </dl>
        <dl>
          <dt>Misc</dt>
          <dd><a href="https://open.spotify.com/user/exhjzjc3pr5df8fdgodag53n7">Spotify</a></dd>
          <dd><a href="https://bandcamp.com/thmsrttg">Bandcamp</a></dd>
        </dl>
      </div>
    </main>
    <footer>
      <p class="social">© 2026 Thomas Rettig</p>
    </footer>
    <script>
      const toggleButton = document.getElementById("logo");
      const html = document.documentElement;
      const userPreference = localStorage.getItem("color-mode");

      if (userPreference) {
        html.classList.toggle("dark-mode", userPreference === "dark");
      } else {
        const systemPreference = window.matchMedia("(prefers-color-scheme: dark)").matches;
        html.classList.toggle("dark-mode", systemPreference);
      }

      function toggleColorMode() {
        const isDarkMode = html.classList.toggle("dark-mode");
        localStorage.setItem("color-mode", isDarkMode ? "dark" : "light");

        // Dynamic container haptic feedback (Shake interaction)
        gsap.fromTo("body", 
          { x: -4 }, 
          { x: 4, duration: 0.04, repeat: 5, yoyo: true, clearProps: "x" }
        );
      }

      toggleButton.addEventListener("click", toggleColorMode);

      // --- GSAP Advanced Tracking Systems ---
      const cursorRing = document.querySelector(".custom-cursor-ring");
      const cursorDot = document.querySelector(".custom-cursor-dot");
      const glow = document.querySelector(".ambient-glow");
      const isMobile = window.matchMedia("(max-width: 1000px)").matches;

      // Only mount desktop listeners if user is not on a mobile screen
      if (!isMobile) {
        window.addEventListener("mousemove", (e) => {
          gsap.to([cursorRing, cursorDot], { opacity: 1, duration: 0.2 }); 
          
          gsap.to(cursorDot, {
            x: e.clientX,
            y: e.clientY,
            duration: 0.02
          });

          gsap.to(cursorRing, {
            x: e.clientX,
            y: e.clientY,
            duration: 0.12,
            ease: "power2.out"
          });

          gsap.to(glow, {
            x: e.clientX,
            y: e.clientY,
            duration: 1.6,
            ease: "power3.out"
          });
        });

        // --- GSAP Magnetic Bounds Interaction Engine ---
        const interactiveElements = document.querySelectorAll("a, #logo");

        interactiveElements.forEach((element) => {
          element.addEventListener("mousemove", (e) => {
            const rect = element.getBoundingClientRect();
            const x = e.clientX - (rect.left + rect.width / 2);
            const y = e.clientY - (rect.top + rect.height / 2);

            gsap.to(element, {
              x: x * 0.28,
              y: y * 0.28,
              scale: element.tagName === "A" ? 1.04 : 1, 
              duration: 0.3,
              ease: "power2.out"
            });
          });

          element.addEventListener("mouseenter", () => {
            gsap.to(cursorRing, {
              width: 50,
              height: 50,
              borderColor: "var(--color-accent)",
              duration: 0.3,
              ease: "power2.out"
            });
            
            gsap.to(cursorDot, {
              scale: 1.5,
              duration: 0.2
            });
          });

          element.addEventListener("mouseleave", () => {
            gsap.to(element, {
              x: 0,
              y: 0,
              scale: 1,
              duration: 0.6,
              ease: "elastic.out(1, 0.4)"
            });

            gsap.to(cursorRing, {
              width: 26,
              height: 26,
              borderColor: "var(--cursor-border)",
              duration: 0.3,
              ease: "power2.out"
            });

            gsap.to(cursorDot, {
              scale: 1,
              duration: 0.2
            });
          });

          element.addEventListener("mousedown", () => {
            gsap.to(cursorRing, {
              width: 35,
              height: 35,
              duration: 0.1,
              ease: "power2.in"
            });
          });

          element.addEventListener("mouseup", () => {
            gsap.to(cursorRing, {
              width: 50,
              height: 50,
              duration: 0.15,
              ease: "power2.out"
            });
          });
        });
      }

      // --- GSAP Entry Micro-animations (Runs globally on both Desktop/Mobile) ---
      gsap.set(["header", ".columns-4 dl", "footer"], { opacity: 0, y: 20 });

      gsap.to(["header", ".columns-4 dl", "footer"], {
        opacity: 1,
        y: 0,
        duration: 1.4,
        stagger: 0.1,
        ease: "power3.out",
        delay: 0.15
      });
    </script>
  </body>
